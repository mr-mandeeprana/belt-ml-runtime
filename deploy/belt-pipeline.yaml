apiVersion: numaflow.numaproj.io/v1alpha1
kind: Pipeline
metadata:
  name: belt-stream
  namespace: default

spec:
  interStepBufferServiceName: default-isb

  vertices:
    - name: kafka-source
      source:
        kafka:
          brokers:
            - kafka.kafka.svc.cluster.local:9092
          topic: belt-data
          consumerGroup: belt-ml-group
        transformer:
          container:
            image: belt-ml-runtime:latest # Same image, different entrypoint
            imagePullPolicy: Never
            args: ["python", "app/source_transformer.py"]
      scale:
        min: 1
        max: 2

    - name: ml-runtime
      udf:
        container:
          image: belt-ml-runtime:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      scale:
        min: 1
        max: 1

    - name: kafka-output
      sink:
        kafka:
          brokers:
            - kafka.kafka.svc.cluster.local:9092
          topic: belt-predictions

  edges:
    - from: kafka-source
      to: ml-runtime
    - from: ml-runtime
      to: kafka-output
